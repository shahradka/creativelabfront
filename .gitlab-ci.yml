variables:
  DOCKER_TLS_CERTDIR: ''
  DOCKER_DRIVER: overlay2

stages:
  - build

services:
  - name: docker:24.0.5-dind
    alias: docker

build:
  stage: build
  image: docker:24.0.5
  rules:
    - if: '$CI_COMMIT_TAG =~ /^dev-\d+(\.\d+)*$/'
  before_script:
    - echo "Logging into Docker Hub..."
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  script:
    - echo "🚀 Start building Docker image"
    - echo "Creating .env file"
    - |
      cat <<EOF > .env
      EOF

    # ---- Build & Push to Docker Hub For storybook repository ----
    - docker build -t $DOCKERHUB_USERNAME/creativelabfront-app-storybook:${CI_COMMIT_SHA:0:8} -f Dockerfile.storybook
    - docker push $DOCKERHUB_USERNAME/creativelabfront-app-storybook:${CI_COMMIT_SHA:0:8}
    - docker tag $DOCKERHUB_USERNAME/creativelabfront-app-storybook:${CI_COMMIT_SHA:0:8} $DOCKERHUB_USERNAME/creativelabfront-app-storybook:latest
    - docker push $DOCKERHUB_USERNAME/creativelabfront-app-storybook:latest

      # ---- Build & Push to Docker Hub For storybook repository ----
    - docker build -t $DOCKERHUB_USERNAME/creativelabfront-app-web:${CI_COMMIT_SHA:0:8} -f Dockerfile.web
    - docker push $DOCKERHUB_USERNAME/creativelabfront-app-web:${CI_COMMIT_SHA:0:8}
    - docker tag $DOCKERHUB_USERNAME/creativelabfront-app-web:${CI_COMMIT_SHA:0:8} $DOCKERHUB_USERNAME/creativelabfront-app-web:latest
    - docker push $DOCKERHUB_USERNAME/creativelabfront-app-web:latest
